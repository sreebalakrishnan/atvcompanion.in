<style>
  :root {
    --bg:        #F8F6EF;
    --ink:       #282826;
    --ink-soft:  #4B4B4A;
    --muted:     #847171;
    --rule:      #C8C5BF;
    --saffron:   #B46E3B;
    --display: 'Libre Caslon Display', 'Libre Caslon Text', 'Cormorant Garamond', serif;
    --body:    'Switzer', 'Spectral', system-ui, -apple-system, sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: var(--body);
    font-weight: 200;
    color: var(--ink);
    background: var(--bg);
    background-image:
      radial-gradient(circle at 12% 8%, rgba(180,110,59,.05), transparent 40%),
      radial-gradient(circle at 88% 100%, rgba(110,125,133,.05), transparent 50%);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }
  main {
    text-align: center;
    max-width: 540px;
  }
  .eyebrow {
    font-family: var(--display);
    font-style: italic;
    font-size: 13px;
    letter-spacing: .14em;
    color: var(--saffron);
    text-transform: lowercase;
    margin-bottom: 16px;
  }
  h1 {
    font-family: var(--display);
    font-weight: 500;
    font-size: clamp(40px, 8vw, 60px);
    line-height: 1.05;
    margin: 0 0 22px;
    letter-spacing: -.01em;
  }
  h1 em { font-style: italic; color: var(--saffron); }
  .sub {
    font-family: var(--display);
    font-style: italic;
    font-size: clamp(17px, 2.6vw, 19px);
    color: var(--ink-soft);
    margin: 0 auto;
    max-width: 44ch;
    line-height: 1.55;
  }
  .ornament {
    color: var(--saffron);
    margin-top: 32px;
    opacity: .55;
  }
  .ornament svg { width: 14px; height: 14px; }
  .footnote {
    margin-top: 36px;
    font-family: var(--display);
    font-style: italic;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: .03em;
  }
</style>
</head>
<body>

<main>
  <div class="eyebrow">atvcompanion.in</div>
  <h1>Back <em>soon</em></h1>
  <p class="sub">Stepping back to align on a few things. We&rsquo;ll be back when it&rsquo;s ready.</p>
  <div class="ornament" aria-hidden="true">
    <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 2 13.5 10.5 22 12 13.5 13.5 12 22 10.5 13.5 2 12 10.5 10.5z"/></svg>
  </div>
  <p class="footnote">&mdash; Sree &amp; Sanchi</p>
</main>

</body>
