name: Deploy to Static.app
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Stage files
        run: |
          mkdir -p staging/astrology101

          # 1. Copy astrology101 content into staging/astrology101/
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='staging' \
            --exclude='README.md' \
            --exclude='astrology-101-knowledge-base' \
            --exclude='*.sh' \
            --exclude='_root' \
            ./ staging//

          # 2. Copy site-root files into staging/ (so they land at the site root)
          if [ -d "_root" ]; then
            rsync -av _root/ staging/
          fi

          # 3. Sanity check what's about to be uploaded
          echo "==== Staging tree ===="
          find staging -type f

      - name: Deploy to Static.app
        uses: designmodo/static-app-deploy-action@v1.0.0
        with:
          api-key: ${{ secrets.STATIC_APP_API_KEY }}
          pid: 'rujcfa7h6w'
          build-dir: 'staging'