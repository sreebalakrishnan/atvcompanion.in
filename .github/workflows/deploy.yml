name: Deploy to Static.app

# Deploys every push to main to https://atv-companion.sreebalakrishnan.in via static.app.
# Single staging step: copy the whole repo into staging/, exclude internal-only stuff,
# upload staging/ as the site root.

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Stage files for upload
        run: |
          mkdir -p staging
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='staging' \
            --exclude='_root' \
            --exclude='astrology-101-knowledge-base' \
            --exclude='scripts' \
            --exclude='tools' \
            --exclude='*.sh' \
            --exclude='*.bak' \
            --exclude='*.bak2' \
            --exclude='*.bak.*' \
            --exclude='.gitignore' \
            --exclude='.gitattributes' \
            --exclude='.DS_Store' \
            --exclude='**/.DS_Store' \
            --exclude='README.md' \
            --exclude='USER_TESTING.txt' \
            --exclude='workbook-avatar-template.md' \
            ./ staging/

          echo "==== Staging tree ===="
          find staging -type f | sort
          echo "==== File count: $(find staging -type f | wc -l) ===="

      - name: Deploy to Static.app
        uses: designmodo/static-app-deploy-action@v1.0.0
        with:
          api-key: ${{ secrets.STATIC_APP_API_KEY }}
          pid: 'rujcfa7h6w'
          build-dir: 'staging'
